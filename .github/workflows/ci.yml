name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Pint)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nbtech_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint (dry-run)
        run: ./vendor/bin/pint --test

  test:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nbtech_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup environment
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i "s|DB_DATABASE=.*|DB_DATABASE=nbtech_test|" .env
          sed -i "s|DB_PASSWORD=.*|DB_PASSWORD=postgres|" .env

      - name: Run migrations
        run: php artisan migrate --force
        env:
          APP_ENV: testing
          DB_DATABASE: nbtech_test
          DB_PASSWORD: postgres

      - name: Run tests
        run: php artisan test --no-coverage
        env:
          APP_ENV: testing
          DB_DATABASE: nbtech_test
          DB_PASSWORD: postgres

  build:
    name: Build assets
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-prod-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-prod-

      - name: Install PHP deps (no dev)
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Install Node deps
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Cache Laravel config
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            public/build/
            vendor/
            bootstrap/cache/
          retention-days: 3

  deploy:
    name: Trigger Dokploy deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build]
    steps:
      - name: Trigger Dokploy deploy webhook
        run: |
          if [ -n "${{ secrets.DOKPLOY_DEPLOY_URL }}" ]; then
            curl -s -X POST "${{ secrets.DOKPLOY_DEPLOY_URL }}" \
              -H "Content-Type: application/json" \
              -d '{"commit": "${{ github.sha }}", "ref": "${{ github.ref }}"}'
            echo "Deploy triggered successfully"
          else
            echo "DOKPLOY_DEPLOY_URL not set — skipping automatic deploy"
          fi
